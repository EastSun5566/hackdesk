<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HackDesk</title>
    <script>
      (function () {
        var theme = localStorage.getItem('theme-mode') || localStorage.getItem('theme') || 'system';
        var presetId = localStorage.getItem('theme-preset-id') || 'hackmd';
        var cachedCss = localStorage.getItem('hackdesk-theme-css');
        var resolved = theme === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : theme;
        var background = resolved === 'dark' ? '#27272A' : '#FDFDFD';
        var colorSchemeMeta = document.querySelector('meta[name="color-scheme"]');

        if (colorSchemeMeta) {
          colorSchemeMeta.setAttribute('content', resolved);
        }
        if (cachedCss) {
          var style = document.createElement('style');
          style.id = 'hackdesk-theme-preload';
          style.textContent = cachedCss;
          document.head.appendChild(style);
          var backgroundMatch = cachedCss.match(/--background-default:\s*([^;]+);/);
          if (backgroundMatch) {
            background = backgroundMatch[1].trim();
          }
        }
        document.documentElement.classList.add(resolved);
        document.documentElement.dataset.themePreset = presetId;
        document.documentElement.style.backgroundColor = background;
        document.documentElement.style.colorScheme = resolved;
      })();
    </script>
    <style>
      html,
      body {
        background-color: #FDFDFD;
      }

      html.dark,
      html.dark body {
        background-color: #27272A;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
