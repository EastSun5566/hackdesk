name: Electron release

on:
  workflow_dispatch:
  push:
    tags:
      - "electron-v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release-vars.outputs.tag_name }}
      release_id: ${{ steps.create-release.outputs.result }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Check package version
        run: pnpm run version:check

      - name: Resolve release variables
        id: release-vars
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="electron-v${PACKAGE_VERSION}"
          fi
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "$GITHUB_ENV"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes
        id: release-notes
        run: node scripts/release-notes.ts

      - name: Create or update Electron release
        id: create-release
        uses: actions/github-script@v9
        env:
          RELEASE_TAG: ${{ steps.release-vars.outputs.tag_name }}
          RELEASE_NOTES: ${{ steps.release-notes.outputs.release_body }}
        with:
          result-encoding: string
          script: |
            const releaseName = `HackDesk Electron v${process.env.PACKAGE_VERSION}`;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: process.env.RELEASE_TAG
              });
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: data.id,
                name: releaseName,
                body: process.env.RELEASE_NOTES,
                draft: true,
                prerelease: true
              });
              return String(data.id);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.RELEASE_TAG,
              target_commitish: context.sha,
              name: releaseName,
              body: process.env.RELEASE_NOTES,
              draft: true,
              prerelease: true
            });
            return String(data.id);

  build-app:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: macos
            os: macos-latest
            builder_args: --mac --x64 --arm64
          - build: windows
            os: windows-latest
            builder_args: --win --x64
          - build: linux
            os: ubuntu-latest
            builder_args: --linux AppImage --x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Linux packaging dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install Pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Require macOS signing and notarization secrets
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$APPLE_TEAM_ID"

      - name: Require Windows signing secrets
        if: matrix.os == 'windows-latest'
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        shell: bash
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"

      - name: Build Electron package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ matrix.os == 'windows-latest' && secrets.WIN_CSC_LINK || secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'windows-latest' && secrets.WIN_CSC_KEY_PASSWORD || secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          pnpm run icons:electron
          pnpm run build:electron
          pnpm exec electron-builder ${{ matrix.builder_args }} --publish never

      - name: Upload Electron release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.create-release.outputs.tag_name }}
        run: |
          shopt -s nullglob
          assets=(release/electron/*.{dmg,zip,exe,AppImage,yml,blockmap})
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No Electron release assets were produced."
            exit 1
          fi
          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber

  publish-release:
    needs: [create-release, build-app]
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Publish Electron prerelease
        uses: actions/github-script@v9
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
              prerelease: true
            });
