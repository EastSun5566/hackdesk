name: Electron release

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    outputs:
      is_beta: ${{ steps.release-kind.outputs.is_beta }}
      channel: ${{ steps.release-kind.outputs.channel }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Verify release tag
        shell: bash
        run: test "${GITHUB_REF_NAME}" = "v$(node -p "require('./package.json').version")"
      - name: Resolve release kind
        id: release-kind
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "$version" =~ -beta(\.|$) ]]; then
            echo "is_beta=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_beta=false" >> "$GITHUB_OUTPUT"
          fi
          channel="latest"
          if [[ "$version" == *-* ]]; then
            channel="${version#*-}"
            channel="${channel%%.*}"
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
      - run: pnpm run check
      - run: xvfb-run --auto-servernum pnpm run test:smoke
      - run: pnpm run docs:build
      - run: pnpm run audit:prod

  publish:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --mac --x64 --arm64
          - os: windows-latest
            args: --win --x64
          - os: ubuntu-latest
            args: --linux AppImage --x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Verify macOS signing secrets
        if: matrix.os == 'macos-latest' && needs.quality.outputs.is_beta != 'true'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for value in "$CSC_LINK" "$CSC_KEY_PASSWORD" "$APPLE_ID" "$APPLE_APP_SPECIFIC_PASSWORD" "$APPLE_TEAM_ID"; do
            if [[ -z "$value" ]]; then
              echo "::error::Required macOS signing or notarization secret is missing."
              exit 1
            fi
          done
      - name: Verify Windows signing secrets
        if: matrix.os == 'windows-latest' && needs.quality.outputs.is_beta != 'true'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if [[ -z "$CSC_LINK" || -z "$CSC_KEY_PASSWORD" ]]; then
            echo "::error::Required Windows signing secret is missing."
            exit 1
          fi
      - run: pnpm run build
      - name: Build unsigned beta and upload to draft
        if: needs.quality.outputs.is_beta == 'true'
        run: pnpm exec electron-builder ${{ matrix.args }} --config.publish.channel=${{ needs.quality.outputs.channel }} --config.mac.identity=null --config.mac.notarize=false --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_DRAFT: "true"
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Build signed RC or stable release and upload to draft
        if: needs.quality.outputs.is_beta != 'true'
        run: pnpm exec electron-builder ${{ matrix.args }} --config.publish.channel=${{ needs.quality.outputs.channel }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_DRAFT: "true"
          CSC_LINK: ${{ matrix.os == 'windows-latest' && secrets.WIN_CSC_LINK || matrix.os == 'macos-latest' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'windows-latest' && secrets.WIN_CSC_KEY_PASSWORD || matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}

  finalize:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Verify draft release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(node -p "require('./package.json').version")"
          channel="latest"
          if [[ "$version" == *-* ]]; then
            channel="${version#*-}"
            channel="${channel%%.*}"
          fi

          state="$(gh release view "$GITHUB_REF_NAME" --json isDraft,isPrerelease --jq '"\(.isDraft) \(.isPrerelease)"')"
          if [[ "$state" != "true false" ]]; then
            echo "::error::Expected an unpublished draft release, received: $state"
            exit 1
          fi

          asset_names="$(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name')"
          expected_assets=(
            "HackDesk-$version-arm64.dmg"
            "HackDesk-$version-arm64.zip"
            "HackDesk-$version-x64.dmg"
            "HackDesk-$version-x64.zip"
            "HackDesk-$version-x64.exe"
            "HackDesk-$version-x86_64.AppImage"
            "$channel.yml"
            "$channel-mac.yml"
            "$channel-linux.yml"
          )

          for asset in "${expected_assets[@]}"; do
            if ! grep -Fqx "$asset" <<< "$asset_names"; then
              echo "::error::Missing release asset: $asset"
              exit 1
            fi
          done
      - name: Extract release notes
        id: release-notes
        run: node scripts/release-notes.ts
      - name: Publish prerelease
        if: ${{ contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.release-notes.outputs.release_body }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --prerelease --title "HackDesk $GITHUB_REF_NAME" --notes "$RELEASE_NOTES"
      - name: Publish stable release
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.release-notes.outputs.release_body }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest --title "HackDesk $GITHUB_REF_NAME" --notes "$RELEASE_NOTES"
      - name: Verify published release state
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          expected_prerelease="false"
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            expected_prerelease="true"
          fi

          state="$(gh release view "$GITHUB_REF_NAME" --json isDraft,isPrerelease --jq '"\(.isDraft) \(.isPrerelease)"')"
          if [[ "$state" != "false $expected_prerelease" ]]; then
            echo "::error::Unexpected published release state: $state"
            exit 1
          fi
